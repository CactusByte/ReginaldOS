<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenDoerr</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --border: #252525;
      --text: #ddd;
      --muted: #555;
      --accent: #4a9eff;
      --green: #4caf50;
      --amber: #ff9800;
      --red: #f44336;
      --bar: 52px;
      --chat-w: 300px;
      --radius: 8px;
      --preview-bar: 38px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    /* ── Split layout ── */
    #layout {
      position: fixed;
      inset: 0 0 var(--bar) 0;
      display: flex;
    }

    /* ── Chat panel (left) ── */
    #chat-panel {
      width: 100%;      /* full-width until preview appears */
      min-width: 160px;
      max-width: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, max-width 0.25s ease;
    }
    /* Constrained once preview is visible */
    #layout.has-preview #chat-panel {
      width: var(--chat-w);
      max-width: 60vw;
    }

    /* ── Resize handle ── */
    #resize-handle {
      width: 4px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s;
      position: relative;
      z-index: 5;
      display: none;   /* hidden until preview appears */
    }
    #layout.has-preview #resize-handle { display: block; }
    #resize-handle:hover,
    #resize-handle.dragging { background: var(--accent); }

    #chat-panel-header {
      padding: 6px 10px 6px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #btn-new-session {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      transition: color 0.15s, border-color 0.15s;
    }
    #btn-new-session:hover { color: var(--text); border-color: #444; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Message bubbles */
    .msg {
      max-width: 92%;
      padding: 8px 11px;
      border-radius: var(--radius);
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ccc;
      border-bottom-left-radius: 3px;
    }
    .msg.agent.streaming { opacity: 0.85; }

    /* Typing indicator (three bouncing dots) */
    .typing-indicator {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 10px 14px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-indicator .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Tool call row */
    .tool-row {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      padding: 2px 4px;
    }
    .tool-row .tool-icon { font-size: 11px; opacity: 0.6; }
    .tool-row .tool-name { color: #888; }
    .tool-row .tool-status { font-size: 11px; }
    .tool-row .tool-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Preview panel (right) ── */
    #canvas-panel {
      flex: 1;
      min-width: 0;
      display: none;   /* hidden until agent triggers a project */
      flex-direction: column;
    }
    #layout.has-preview #canvas-panel { display: flex; }

    /* Slim toolbar above the iframe */
    #preview-bar {
      height: var(--preview-bar);
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    #preview-url {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
    }
    .preview-btn:hover { color: var(--text); border-color: #444; }
    .preview-btn:disabled { opacity: 0.3; cursor: default; }

    /* iframe wrapper */
    #preview-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* Loading overlay */
    #preview-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    #preview-overlay.hidden { display: none; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ── Bottom bar ── */
    #bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    #status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status.connected  { background: var(--green); }
    #status.thinking   { background: var(--amber); }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      min-width: 0;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }
    #input:disabled { opacity: 0.4; }

    #send {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send:hover  { opacity: 0.85; }
    #send:disabled { opacity: 0.3; cursor: default; }

  </style>
</head>
<body>

  <div id="layout">

    <!-- ── Chat history panel (left) ── -->
    <div id="chat-panel">
      <div id="chat-panel-header">
        <span>Chat</span>
        <button id="btn-new-session" title="Start a new session">+ New</button>
      </div>
      <div id="messages"></div>
    </div>

    <!-- ── Resize handle ── -->
    <div id="resize-handle"></div>

    <!-- ── Preview panel (right) ── -->
    <div id="canvas-panel">

      <div id="preview-bar">
        <span id="preview-url">Starting preview…</span>
        <button id="btn-refresh" class="preview-btn" title="Refresh preview" disabled>↺ Refresh</button>
        <a id="btn-export" class="preview-btn" href="#" title="Export project as static site">↓ Export</a>
      </div>

      <div id="preview-wrap">
        <iframe id="preview" title="Website preview"></iframe>
        <div id="preview-overlay">
          <div class="spinner"></div>
          <span id="overlay-label">Starting Astro…</span>
        </div>
      </div>

    </div>

  </div>

  <div id="bar">
    <div id="status" title="Disconnected"></div>
    <input id="input" type="text" placeholder="Message OpenDoerr…" autocomplete="off" disabled />
    <button id="send" disabled>Send</button>
  </div>

  <script>
    // ── Session identity ──────────────────────────────────────────────────────
    const SESSION_KEY = "od_session_id"
    let sessionId = localStorage.getItem(SESSION_KEY)
    if (!sessionId) {
      sessionId = crypto.randomUUID()
      localStorage.setItem(SESSION_KEY, sessionId)
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const layoutEl       = document.getElementById("layout")
    const messagesEl     = document.getElementById("messages")
    const statusEl       = document.getElementById("status")
    const inputEl        = document.getElementById("input")
    const sendEl         = document.getElementById("send")
    const previewFrame   = document.getElementById("preview")
    const previewOverlay = document.getElementById("preview-overlay")
    const overlayLabel   = document.getElementById("overlay-label")
    const previewUrl     = document.getElementById("preview-url")
    const btnRefresh     = document.getElementById("btn-refresh")
    const btnExport      = document.getElementById("btn-export")

    // ── State ─────────────────────────────────────────────────────────────────
    let ws           = null
    let thinking     = false
    let streamBuf    = ""
    let streamBubble = null
    let typingEl     = null          // animated typing indicator bubble
    const toolEls    = {}            // toolCallId → .tool-row element
    let reconnectMs  = 1000

    // ── Helpers ───────────────────────────────────────────────────────────────
    let connected = false

    function updateInputState() {
      inputEl.disabled = !connected || thinking
      sendEl.disabled  = !connected || thinking
    }

    function setConnected(on) {
      connected = on
      statusEl.className = on ? "connected" : ""
      updateInputState()
    }

    function setThinking(on) {
      thinking = on
      updateInputState()
    }

    function scrollMessages() {
      messagesEl.scrollTop = messagesEl.scrollHeight
    }

    function addBubble(role, text) {
      const el = document.createElement("div")
      el.className = `msg ${role}`
      el.textContent = text
      messagesEl.appendChild(el)
      scrollMessages()
      return el
    }

    function showTyping() {
      if (typingEl) return
      typingEl = document.createElement("div")
      typingEl.className = "typing-indicator"
      typingEl.innerHTML = "<span class='dot'></span><span class='dot'></span><span class='dot'></span>"
      messagesEl.appendChild(typingEl)
      scrollMessages()
    }

    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null }
    }

    function addToolRow(id, name) {
      hideTyping()
      const el = document.createElement("div")
      el.className = "tool-row"
      el.innerHTML = `<span class="tool-spinner"></span><span class="tool-name">${name}</span>`
      messagesEl.appendChild(el)
      toolEls[id] = el
      scrollMessages()
    }

    function resolveToolRow(id, isError) {
      const el = toolEls[id]
      if (!el) return
      const spinner = el.querySelector(".tool-spinner")
      if (spinner) {
        const icon = document.createElement("span")
        icon.className = "tool-icon"
        icon.textContent = isError ? "✗" : "✓"
        icon.style.color = isError ? "var(--red)" : "var(--green)"
        spinner.replaceWith(icon)
      }
      delete toolEls[id]
    }

    function clearTurn() {
      hideTyping()
      if (streamBubble) {
        streamBubble.classList.remove("streaming")
        streamBubble = null
        streamBuf = ""
      }
      setThinking(false)
    }

    // ── WebSocket connection ──────────────────────────────────────────────────
    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:"
      ws = new WebSocket(`${proto}//${location.host}/ws`)

      ws.onopen = () => {
        reconnectMs = 1000
        setConnected(true)
        ws.send(JSON.stringify({ type: "init", sessionId }))
      }

      ws.onclose = () => {
        setConnected(false)
        setTimeout(connect, reconnectMs)
        reconnectMs = Math.min(reconnectMs * 2, 30_000)
      }

      ws.onmessage = ev => {
        const msg = JSON.parse(ev.data)

        switch (msg.type) {

          case "token":
            hideTyping()
            if (!streamBubble) {
              streamBubble = addBubble("agent streaming", "")
            }
            streamBuf += msg.delta
            streamBubble.textContent = streamBuf
            scrollMessages()
            break

          case "stream_reset":
            // API overloaded — wipe partial bubble, show typing indicator again
            if (streamBubble) { streamBubble.remove(); streamBubble = null }
            streamBuf = ""
            showTyping()
            break

          case "tool_start":
            addToolRow(msg.toolCallId, msg.name)
            break

          case "tool_result":
            resolveToolRow(msg.toolCallId, msg.isError)
            showTyping()
            break

          case "project_starting":
            layoutEl.classList.add("has-preview")
            previewOverlay.classList.remove("hidden")
            overlayLabel.textContent = "Starting Astro…"
            previewUrl.textContent = "Starting preview…"
            btnRefresh.disabled = true
            break

          case "project_ready":
            layoutEl.classList.add("has-preview")
            previewFrame.src = msg.url
            previewOverlay.classList.add("hidden")
            previewUrl.textContent = msg.url
            btnRefresh.disabled = false
            btnExport.href = `/export/${encodeURIComponent(msg.sessionId)}`
            break

          case "turn_end":
            clearTurn()
            break

          case "error":
            clearTurn()
            addBubble("agent", `Error: ${msg.message}`)
            break
        }
      }
    }

    // ── Refresh button ────────────────────────────────────────────────────────
    btnRefresh.addEventListener("click", () => {
      if (previewFrame.src) previewFrame.contentWindow?.location.reload()
    })

    // ── Send message ──────────────────────────────────────────────────────────
    function send() {
      const text = inputEl.value.trim()
      if (!text || thinking || !ws || ws.readyState !== WebSocket.OPEN) return
      inputEl.value = ""
      addBubble("user", text)
      streamBubble = null
      streamBuf = ""
      setThinking(true)
      showTyping()
      ws.send(JSON.stringify({ type: "chat", sessionId, text }))
    }

    // ── Sidebar resize ────────────────────────────────────────────────────────
    const chatPanel    = document.getElementById("chat-panel")
    const resizeHandle = document.getElementById("resize-handle")
    const CHAT_W_KEY   = "od_chat_width"

    const savedWidth = parseInt(localStorage.getItem(CHAT_W_KEY), 10)
    if (savedWidth) chatPanel.style.width = savedWidth + "px"

    resizeHandle.addEventListener("mousedown", e => {
      e.preventDefault()
      resizeHandle.classList.add("dragging")
      document.body.style.cursor = "col-resize"
      document.body.style.userSelect = "none"

      const onMove = e => {
        const rect = chatPanel.parentElement.getBoundingClientRect()
        const newW = Math.min(Math.max(e.clientX - rect.left, 160), rect.width * 0.6)
        chatPanel.style.width = newW + "px"
      }

      const onUp = () => {
        resizeHandle.classList.remove("dragging")
        document.body.style.cursor = ""
        document.body.style.userSelect = ""
        localStorage.setItem(CHAT_W_KEY, parseInt(chatPanel.style.width, 10))
        document.removeEventListener("mousemove", onMove)
        document.removeEventListener("mouseup", onUp)
      }

      document.addEventListener("mousemove", onMove)
      document.addEventListener("mouseup", onUp)
    })

    sendEl.addEventListener("click", send)
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send() }
    })

    // ── New session ───────────────────────────────────────────────────────────
    document.getElementById("btn-new-session").addEventListener("click", () => {
      localStorage.removeItem(SESSION_KEY)
      location.reload()
    })

    connect()
  </script>
</body>
</html>
