<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ReginaldOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f6fc;
      --surface:  #ffffff;
      --surface2: #eef0f8;
      --active:   #e6e9f8;
      --border:   #dfe2f0;
      --accent:   #4c5cf2;
      --text:     #1a1c2e;
      --muted:    #8791b2;
      --user-bg:  #4c5cf2;
      --code-bg:  #f8f9fe;
      --green:    #16a34a;
      --amber:    #d97706;
      --red:      #dc2626;
      --radius:   10px;
      --sess-w:   256px;
    }

    html, body {
      height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
    }

    #app { display: flex; height: 100vh; }

    /* ── Sessions panel ── */
    #sessions-panel {
      width: var(--sess-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    #sessions-brand {
      padding: 16px 14px 14px;
      display: flex; align-items: center; gap: 9px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    #brand-icon {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    #brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; flex: 1; }

    #btn-new-session {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 4px 10px;
      font-size: 12px; cursor: pointer; font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #btn-new-session:hover { color: var(--text); border-color: #b0b8d8; background: var(--surface2); }

    #sessions-meta {
      padding: 10px 14px 6px;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    #sessions-meta span:first-child { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    #sessions-count { font-size: 11px; background: var(--surface2); color: var(--muted); padding: 1px 7px; border-radius: 20px; }

    #sessions-list { flex: 1; overflow-y: auto; padding: 2px 8px 8px; }
    #sessions-list::-webkit-scrollbar { width: 4px; }
    #sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .session-item {
      padding: 8px 10px; border-radius: 7px; cursor: pointer;
      font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.12s, color 0.12s;
    }
    .session-item:hover { background: var(--surface2); color: var(--text); }
    .session-item.active { background: var(--active); color: var(--text); font-weight: 500; }

    .sessions-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 0; }

    #sessions-footer { padding: 10px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }

    #btn-clear-history {
      width: 100%; background: transparent; border: 1px solid #f5c6c6;
      color: var(--red); border-radius: 7px; padding: 7px 12px; font-size: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; font-family: inherit; transition: background 0.15s;
    }
    #btn-clear-history:hover { background: #fef2f2; }

    /* ── Main chat ── */
    #main { flex: 1; min-width: 320px; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    #main-header {
      height: 54px; padding: 0 20px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }

    #chat-title { font-size: 15px; font-weight: 600; flex: 1; }

    #search-wrap { position: relative; display: flex; align-items: center; }
    #search-wrap .search-icon { position: absolute; left: 9px; color: var(--muted); pointer-events: none; }
    #search-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px 6px 30px;
      color: var(--text); font-size: 13px; width: 168px; outline: none;
      font-family: inherit; transition: border-color 0.15s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--accent); }

    #status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--border);
      flex-shrink: 0; transition: background 0.3s;
    }
    #status-dot.connected { background: var(--green); }
    #status-dot.thinking  { background: var(--amber); animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-user {
      align-self: flex-end; max-width: 68%;
      background: var(--user-bg); color: #fff;
      padding: 10px 14px; border-radius: var(--radius); border-bottom-right-radius: 3px;
      font-size: 13.5px; line-height: 1.55; word-break: break-word; white-space: pre-wrap;
    }

    .msg-agent { align-self: flex-start; max-width: 80%; }

    .msg-agent-bubble {
      background: var(--surface); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: var(--radius); border-bottom-left-radius: 3px;
      font-size: 13.5px; line-height: 1.65; color: var(--text); word-break: break-word;
    }
    .msg-agent-bubble.streaming { white-space: pre-wrap; }

    .msg-agent-bubble p { margin-bottom: 0.5em; }
    .msg-agent-bubble p:last-child { margin-bottom: 0; }
    .msg-agent-bubble ul, .msg-agent-bubble ol { padding-left: 1.4em; margin-bottom: 0.5em; }
    .msg-agent-bubble li { margin-bottom: 0.2em; }
    .msg-agent-bubble h1, .msg-agent-bubble h2, .msg-agent-bubble h3 {
      margin: 0.7em 0 0.3em; font-size: 1em; font-weight: 600; color: var(--text);
    }
    .msg-agent-bubble strong { font-weight: 600; }
    .msg-agent-bubble a { color: var(--accent); text-decoration: none; }
    .msg-agent-bubble a:hover { text-decoration: underline; }
    .msg-agent-bubble code:not(pre code) {
      background: var(--code-bg); color: #3b4c8c; border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 4px; font-size: 12px;
      font-family: "SF Mono","Fira Code",Consolas,monospace;
    }
    .msg-agent-bubble pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 8px; margin: 8px 0; overflow: hidden;
    }
    .msg-agent-bubble pre code.hljs {
      padding: 14px 16px; font-size: 12.5px; line-height: 1.55;
      font-family: "SF Mono","Fira Code",Consolas,monospace;
      background: transparent;
    }

    .code-block-wrap { position: relative; margin: 8px 0; }
    .code-lang-label {
      position: absolute; top: 8px; right: 10px;
      font-size: 11px; color: var(--muted); font-family: monospace; z-index: 1;
    }

    .msg-actions { display: flex; gap: 5px; margin-top: 4px; opacity: 0; transition: opacity 0.15s; }
    .msg-agent:hover .msg-actions { opacity: 1; }
    .msg-action-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); font-size: 11px;
      padding: 2px 8px; cursor: pointer; font-family: inherit;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .msg-action-btn:hover { color: var(--text); border-color: #b0b8d8; background: var(--surface2); }

    .typing-indicator {
      align-self: flex-start; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 3px;
      padding: 11px 16px; display: flex; gap: 5px; align-items: center;
    }
    .typing-indicator .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: .2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-4px);opacity:1} }

    .tool-row {
      align-self: flex-start; display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px;
    }
    .tool-spinner {
      width: 10px; height: 10px; border: 1.5px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tool-status-icon { font-size: 11px; flex-shrink: 0; line-height: 1; }
    .tool-name { color: #4a5580; font-family: "SF Mono",Consolas,monospace; font-size: 12px; }

    .agent-image {
      align-self: flex-start; max-width: 80%;
      border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
    }
    .agent-image img { display: block; max-width: 100%; }

    /* ── Input area ── */
    #input-area {
      flex-shrink: 0; padding: 10px 20px 16px;
      background: var(--surface); border-top: 1px solid var(--border);
    }

    #input-wrap {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 8px 10px; transition: border-color 0.15s;
    }
    #input-wrap:focus-within { border-color: var(--accent); }

    #input {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-size: 14px; outline: none; resize: none; line-height: 1.5;
      max-height: 150px; overflow-y: auto; padding: 3px 0; font-family: inherit;
    }
    #input::placeholder { color: var(--muted); }
    #input:disabled { opacity: 0.45; }

    #send {
      width: 32px; height: 32px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send:hover { opacity: 0.85; }
    #send:disabled { opacity: 0.3; cursor: default; }

    /* ── Resize handle ── */
    #resize-handle {
      width: 4px; flex-shrink: 0; cursor: col-resize;
      background: var(--border); transition: background 0.15s;
      display: none; z-index: 5;
    }
    #app.has-preview #resize-handle { display: block; }
    #resize-handle:hover, #resize-handle.dragging { background: var(--accent); }

    /* ── Preview panel ── */
    #preview-panel {
      flex: 1; min-width: 280px; display: none;
      flex-direction: column; border-left: 1px solid var(--border);
    }
    #app.has-preview #preview-panel { display: flex; }

    #preview-bar {
      height: 42px; flex-shrink: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; gap: 8px;
    }

    #preview-url {
      flex: 1; font-size: 12px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace;
    }

    .preview-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 12px; padding: 3px 10px; cursor: pointer;
      white-space: nowrap; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px; font-family: inherit;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .preview-btn:hover { color: var(--text); border-color: #b0b8d8; background: var(--surface2); }
    .preview-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    #preview-wrap { flex: 1; position: relative; overflow: hidden; }
    #preview { width: 100%; height: 100%; border: none; display: block; background: #fff; }

    #preview-overlay {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; color: var(--muted); font-size: 13px;
    }
    #preview-overlay.hidden { display: none; }

    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sessions panel ── -->
  <aside id="sessions-panel">
    <div id="sessions-brand">
      <div id="brand-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <span id="brand-name">ReginaldOS</span>
      <button id="btn-new-session">+ New</button>
    </div>

    <div id="sessions-meta">
      <span>Conversations</span>
      <span id="sessions-count">0</span>
    </div>

    <div id="sessions-list">
      <div class="sessions-empty">No conversations yet</div>
    </div>

    <div id="sessions-footer">
      <button id="btn-clear-history">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
        </svg>
        New session
      </button>
    </div>
  </aside>

  <!-- ── Main chat ── -->
  <main id="main">
    <header id="main-header">
      <h1 id="chat-title">Chat</h1>
      <div id="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search conversations…" autocomplete="off"/>
      </div>
      <div id="status-dot" title="Disconnected"></div>
    </header>

    <div id="messages"></div>

    <div id="input-area">
      <div id="input-wrap">
        <textarea id="input" placeholder="Message ReginaldOS…" rows="1" disabled></textarea>
        <button id="send" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- ── Resize handle ── -->
  <div id="resize-handle"></div>

  <!-- ── Preview panel (shown only when a project is active) ── -->
  <aside id="preview-panel">
    <div id="preview-bar">
      <span id="preview-url">Starting preview…</span>
      <button id="btn-refresh" class="preview-btn" disabled>↺ Refresh</button>
      <a id="btn-export" class="preview-btn" href="#">↓ Export</a>
    </div>
    <div id="preview-wrap">
      <iframe id="preview" title="Website preview"></iframe>
      <div id="preview-overlay">
        <div class="spinner"></div>
        <span id="overlay-label">Starting Astro…</span>
      </div>
    </div>
  </aside>

</div>
<script>
  // ── Session identity ──────────────────────────────────────────────────────
  const SESSION_KEY = "od_session_id"
  let sessionId = localStorage.getItem(SESSION_KEY)
  if (!sessionId) {
    sessionId = crypto.randomUUID()
    localStorage.setItem(SESSION_KEY, sessionId)
  }

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const appEl          = document.getElementById("app")
  const messagesEl     = document.getElementById("messages")
  const statusDot      = document.getElementById("status-dot")
  const inputEl        = document.getElementById("input")
  const sendEl         = document.getElementById("send")
  const sessionsList   = document.getElementById("sessions-list")
  const sessionsCount  = document.getElementById("sessions-count")
  const previewFrame   = document.getElementById("preview")
  const previewOverlay = document.getElementById("preview-overlay")
  const overlayLabel   = document.getElementById("overlay-label")
  const previewUrl     = document.getElementById("preview-url")
  const btnRefresh     = document.getElementById("btn-refresh")
  const btnExport      = document.getElementById("btn-export")
  const mainEl         = document.getElementById("main")
  const resizeHandle   = document.getElementById("resize-handle")

  // ── State ─────────────────────────────────────────────────────────────────
  let ws            = null
  let thinking      = false
  let streamBuf     = ""
  let streamBubble  = null
  let streamWrapper = null
  let typingEl      = null
  const toolEls     = {}
  let reconnectMs   = 1000
  let connected     = false

  // ── Markdown renderer ─────────────────────────────────────────────────────
  function renderMarkdown(text) {
    if (typeof marked === "undefined") {
      const d = document.createElement("div")
      d.style.whiteSpace = "pre-wrap"
      d.textContent = text
      return d.outerHTML
    }
    const html = marked.parse(text, { gfm: true, breaks: true })
    const tmp = document.createElement("div")
    tmp.innerHTML = html

    tmp.querySelectorAll("pre code").forEach(block => {
      if (typeof hljs !== "undefined") hljs.highlightElement(block)
      const pre = block.parentElement
      const langClass = [...block.classList].find(c => c.startsWith("language-"))
      const lang = langClass ? langClass.replace("language-", "") : ""
      const wrap = document.createElement("div")
      wrap.className = "code-block-wrap"
      if (lang && lang !== "plaintext") {
        const label = document.createElement("span")
        label.className = "code-lang-label"
        label.textContent = lang
        wrap.appendChild(label)
      }
      pre.parentNode.insertBefore(wrap, pre)
      wrap.appendChild(pre)
    })

    return tmp.innerHTML
  }

  // ── Sessions ──────────────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      const res = await fetch("/api/sessions")
      if (!res.ok) return
      renderSessionsList(await res.json())
    } catch {}
  }

  function renderSessionsList(list) {
    sessionsCount.textContent = list.length
    if (list.length === 0) {
      sessionsList.innerHTML = '<div class="sessions-empty">No conversations yet</div>'
      return
    }
    sessionsList.innerHTML = list
      .map(s => `<div class="session-item${s.id === sessionId ? " active" : ""}" data-id="${escAttr(s.id)}" title="${escAttr(s.title)}">${escHtml(s.title)}</div>`)
      .join("")
    sessionsList.querySelectorAll(".session-item").forEach(el => {
      el.addEventListener("click", () => {
        if (el.dataset.id === sessionId) return
        localStorage.setItem(SESSION_KEY, el.dataset.id)
        location.reload()
      })
    })
  }

  function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }
  function escAttr(s) { return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;") }

  // ── Restore messages ──────────────────────────────────────────────────────
  async function loadMessages() {
    try {
      const res = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}`)
      if (!res.ok) return
      const { messages } = await res.json()
      if (!messages || messages.length === 0) return
      for (const m of messages.slice(-40)) {
        if (m.role === "user") addUserBubble(m.content)
        else if (m.role === "assistant") addAgentBubble(m.content)
      }
      scrollMessages()
    } catch {}
  }

  // ── Message helpers ───────────────────────────────────────────────────────
  function scrollMessages() { messagesEl.scrollTop = messagesEl.scrollHeight }

  function addUserBubble(text) {
    const el = document.createElement("div")
    el.className = "msg-user"
    el.textContent = text
    messagesEl.appendChild(el)
    return el
  }

  function addAgentBubble(text) {
    const wrapper = document.createElement("div")
    wrapper.className = "msg-agent"
    const bubble = document.createElement("div")
    bubble.className = "msg-agent-bubble"
    bubble.innerHTML = renderMarkdown(text)
    wrapper.appendChild(bubble)
    wrapper.appendChild(makeCopyActions(text))
    messagesEl.appendChild(wrapper)
    return wrapper
  }

  function makeCopyActions(text) {
    const actions = document.createElement("div")
    actions.className = "msg-actions"
    const btn = document.createElement("button")
    btn.className = "msg-action-btn"
    btn.textContent = "Copy"
    btn.addEventListener("click", () => navigator.clipboard.writeText(text).catch(() => {}))
    actions.appendChild(btn)
    return actions
  }

  function showTyping() {
    if (typingEl) return
    typingEl = document.createElement("div")
    typingEl.className = "typing-indicator"
    typingEl.innerHTML = "<span class='dot'></span><span class='dot'></span><span class='dot'></span>"
    messagesEl.appendChild(typingEl)
    scrollMessages()
  }

  function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null } }

  function addToolRow(id, name) {
    hideTyping()
    const el = document.createElement("div")
    el.className = "tool-row"
    el.innerHTML = `<span class="tool-spinner"></span><span class="tool-name">${escHtml(name)}</span>`
    messagesEl.appendChild(el)
    toolEls[id] = el
    scrollMessages()
  }

  function resolveToolRow(id, isError) {
    const el = toolEls[id]
    if (!el) return
    const spinner = el.querySelector(".tool-spinner")
    if (spinner) {
      const icon = document.createElement("span")
      icon.className = "tool-status-icon"
      icon.textContent = isError ? "✗" : "✓"
      icon.style.color = isError ? "var(--red)" : "var(--green)"
      spinner.replaceWith(icon)
    }
    delete toolEls[id]
  }

  function updateInputState() {
    inputEl.disabled = !connected || thinking
    sendEl.disabled  = !connected || thinking
  }

  function setConnected(on) {
    connected = on
    statusDot.className = on ? "connected" : ""
    statusDot.title = on ? "Connected" : "Disconnected"
    updateInputState()
  }

  function setThinking(on) {
    thinking = on
    if (connected) statusDot.className = on ? "thinking" : "connected"
    updateInputState()
  }

  function sealStreamBubble() {
    if (!streamBubble) return
    const text = streamBuf
    streamBubble.classList.remove("streaming")
    streamBubble.innerHTML = renderMarkdown(text)
    if (streamWrapper && text) streamWrapper.appendChild(makeCopyActions(text))
    streamBubble = null
    streamWrapper = null
    streamBuf = ""
  }

  function clearTurn() {
    hideTyping()
    sealStreamBubble()
    setThinking(false)
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:"
    ws = new WebSocket(`${proto}//${location.host}/ws`)

    ws.onopen = () => {
      reconnectMs = 1000
      setConnected(true)
      ws.send(JSON.stringify({ type: "init", sessionId }))
    }

    ws.onclose = () => {
      setConnected(false)
      setTimeout(connect, reconnectMs)
      reconnectMs = Math.min(reconnectMs * 2, 30_000)
    }

    ws.onmessage = ev => {
      const msg = JSON.parse(ev.data)
      switch (msg.type) {

        case "token":
          hideTyping()
          if (!streamBubble) {
            streamWrapper = document.createElement("div")
            streamWrapper.className = "msg-agent"
            streamBubble = document.createElement("div")
            streamBubble.className = "msg-agent-bubble streaming"
            streamWrapper.appendChild(streamBubble)
            messagesEl.appendChild(streamWrapper)
          }
          streamBuf += msg.delta
          streamBubble.textContent = streamBuf
          scrollMessages()
          break

        case "stream_reset":
          if (streamWrapper) { streamWrapper.remove(); streamWrapper = null }
          streamBubble = null; streamBuf = ""
          showTyping()
          break

        case "tool_start":
          sealStreamBubble()
          addToolRow(msg.toolCallId, msg.name)
          break

        case "tool_result":
          resolveToolRow(msg.toolCallId, msg.isError)
          showTyping()
          break

        case "canvas_update":
          if (msg.html) {
            const wrap = document.createElement("div")
            wrap.className = "agent-image"
            wrap.innerHTML = msg.html
            messagesEl.appendChild(wrap)
            scrollMessages()
          }
          break

        case "project_starting":
          appEl.classList.add("has-preview")
          previewOverlay.classList.remove("hidden")
          overlayLabel.textContent = "Starting Astro…"
          previewUrl.textContent = "Starting preview…"
          btnRefresh.disabled = true
          break

        case "project_ready":
          appEl.classList.add("has-preview")
          previewFrame.src = msg.url
          previewOverlay.classList.add("hidden")
          previewUrl.textContent = msg.url
          btnRefresh.disabled = false
          btnExport.href = `/export/${encodeURIComponent(msg.sessionId)}`
          break

        case "turn_end":
          clearTurn()
          loadSessions()
          break

        case "error":
          clearTurn()
          addAgentBubble(`⚠ ${msg.message}`)
          scrollMessages()
          break
      }
    }
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  function send() {
    const text = inputEl.value.trim()
    if (!text || thinking || !ws || ws.readyState !== WebSocket.OPEN) return
    inputEl.value = ""
    inputEl.style.height = "auto"
    addUserBubble(text)
    scrollMessages()
    setThinking(true)
    showTyping()
    ws.send(JSON.stringify({ type: "chat", sessionId, text }))
  }

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto"
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + "px"
  })
  sendEl.addEventListener("click", send)
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send() }
  })

  // ── New session ───────────────────────────────────────────────────────────
  function newSession() { localStorage.removeItem(SESSION_KEY); location.reload() }
  document.getElementById("btn-new-session").addEventListener("click", newSession)
  document.getElementById("btn-clear-history").addEventListener("click", () => {
    if (confirm("Start a new session?")) newSession()
  })

  // ── Preview ───────────────────────────────────────────────────────────────
  btnRefresh.addEventListener("click", () => {
    if (previewFrame.src) previewFrame.contentWindow?.location.reload()
  })

  // ── Session search ────────────────────────────────────────────────────────
  document.getElementById("search-input").addEventListener("input", e => {
    const q = e.target.value.toLowerCase()
    document.querySelectorAll(".session-item").forEach(el => {
      el.style.display = !q || el.textContent.toLowerCase().includes(q) ? "" : "none"
    })
  })

  // ── Resize handle ─────────────────────────────────────────────────────────
  resizeHandle.addEventListener("mousedown", e => {
    e.preventDefault()
    resizeHandle.classList.add("dragging")
    document.body.style.cursor = "col-resize"
    document.body.style.userSelect = "none"

    const onMove = e => {
      const sessW = document.getElementById("sessions-panel").offsetWidth
      const total = appEl.offsetWidth - sessW - 4
      const newW = Math.min(Math.max(e.clientX - sessW, 320), total * 0.65)
      mainEl.style.flex = "none"
      mainEl.style.width = newW + "px"
    }
    const onUp = () => {
      resizeHandle.classList.remove("dragging")
      document.body.style.cursor = ""
      document.body.style.userSelect = ""
      document.removeEventListener("mousemove", onMove)
      document.removeEventListener("mouseup", onUp)
    }

    document.addEventListener("mousemove", onMove)
    document.addEventListener("mouseup", onUp)
  })

  // ── Init ──────────────────────────────────────────────────────────────────
  loadMessages()
  loadSessions()
  connect()
</script>
</body>
</html>
